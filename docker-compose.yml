services:
  db:
    image: mysql:8
    container_name: ${DB_NAME}
    env_file:
    - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - dados_mysql:/var/lib/mysql
      - ./backup.sql:/docker-entrypoint-initdb.d/backup.sql

volumes:
  dados_mysql: